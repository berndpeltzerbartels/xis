<!DOCTYPE html>
<html xmlns:xis="https://xis.one/xsd">
<head>
    <title>Model data lifecycle</title>
</head>
<body>
<span id="always">${always}</span>
<span id="initial">${initial}</span>
<span id="after-action">${afterAction}</span>
<span id="selected">${selected}</span>
<span id="action-only">${actionOnly}</span>
<button id="select-second" xis:action="selectSecond" type="button">Select second</button>
<button id="action-only-button" xis:action="actionOnly" type="button">Action only</button>
</body>
</html>
