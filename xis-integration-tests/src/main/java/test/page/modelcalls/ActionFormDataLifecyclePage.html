<!DOCTYPE html>
<html xmlns:xis="https://xis.one/xsd">
<head>
    <title>Action form data lifecycle</title>
</head>
<body>
<xis:form binding="step">
    <input id="action-form-value" type="text" xis:binding="value">
    <button id="select-step" type="submit" xis:action="selectStep">Select step</button>
</xis:form>
</body>
</html>
