<!DOCTYPE html>
<html xmlns:xis="http://xis.one/schema" lang="us-en" xml:lang="us-en">
<head>
    <title>SelectBoxForeachTagTemplateSelect</title>
</head>
<body>
<xis:form binding="formData" id="form">
    <xis:template>
        <select xis:binding="selectedValue" id="selectBox">
            <xis:foreach var="option" array="options">
                <option value="${option.value}">${option.label}</option>
            </xis:foreach>
        </select>
    </xis:template>

    <button xis:action="submit" id="submitButton">Submit</button>
</xis:form>
</body>
</html>
