<html xmlns:xis="https://xis.one/xsd">
<head>
    <title>Selection Test</title>
</head>
<body>
<ul xis:selection-group>
    <li xis:selection-class="selected" id="item1">Item 1</li>
    <li xis:selection-class="selected" id="item2">Item 2</li>
    <li xis:selection-class="selected" id="item3">Item 3</li>
</ul>
<nav selection-group>
    <a selection-class="active" id="nav1">Nav 1</a>
    <a selection-class="active" id="nav2">Nav 2</a>
</nav>
</body>
</html>
