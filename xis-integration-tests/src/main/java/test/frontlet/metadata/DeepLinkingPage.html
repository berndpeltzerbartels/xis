<!DOCTYPE html>
<html xmlns:xis="https://xis.one/xsd" lang="en">
<head>
    <title>${title}</title>
</head>
<body>
<h1>${title}</h1>

<!-- Container A: Has default-frontlet attribute pointing to FrontletMetadata -->
<div id="containerA" xis:frontlet-container="containerA" xis:default-frontlet="FrontletMetadataFrontlet"></div>

<!-- Container B: No default-frontlet, but DeepLinkFrontlet annotation points here -->
<div id="containerB" xis:frontlet-container="containerB"></div>

</body>
</html>
