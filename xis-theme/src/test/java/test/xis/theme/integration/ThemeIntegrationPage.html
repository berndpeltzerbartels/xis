<!DOCTYPE html>
<html lang="en">
<head>
    <title>Theme integration</title>
</head>
<body>
<xt:form-page title="Customer"
                 binding="customer"
                 action="save"
                 submit-label="Save">
    <xt:grid columns="2">
        <xt:input id="name" binding="name" title="Name"/>
        <xt:select id="stage"
                      binding="stage"
                      title="Stage"
                      options="stages"
                      option-value="code"
                      option-label="label"/>
    </xt:grid>
</xt:form-page>
</body>
</html>
