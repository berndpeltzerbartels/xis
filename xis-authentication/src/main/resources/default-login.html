<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:xis="http://xis.one/html">
<head>
    <title>Login</title>
</head>
<body>
<div class="container">
    <div class="form_container" xis:if="${displayLoginForm}">
        <form xis:binding="login">
            <h1>Login ${externalIdpIds}</h1>
            <xis:global-messages/>
            <div class="form-group">
                <label xis:binding="username" xis:error-class="error" for="username">Username:</label>
                <input xis:binding="username" type="text" id="username" name="username" class="form-control"/>
                <xis:message message-for="username"/>
            </div>
            <div class="form-group">
                <label xis:binding="password" xis:error-class="error" for="password">Password:</label>
                <input xis:binding="password" type="password" id="password" name="password" class="form-control"/>
                <xis:message message-for="password"/>
            </div>
            <div class="form-group" xis:if="${totpLoginEnabled}">
                <label xis:binding="totpCode" xis:error-class="error" for="totpCode">Authenticator code:</label>
                <input xis:binding="totpCode" type="text" inputmode="numeric" autocomplete="one-time-code" id="totpCode" name="totpCode" class="form-control"/>
                <xis:message message-for="totpCode"/>
            </div>
            <div class="form-group" xis:repeat="registration:loginFactorRegistrations">
                <a href="${registration.url}">${registration.text}</a>
            </div>
            <input type="hidden" name="state" xis:binding="state" id="state"/>
            <button xis:action="login" type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
    <div class="idp_container">
        <div xis:repeat="idpId:externalIdpIds">
            <a href="${externalIdpUrls[idpId]}">${idpId}</a>
        </div>
    </div>
</div>
</body>
</html>
